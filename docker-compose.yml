services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: csvcollab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d csvcollab"]
      interval: 3s
      timeout: 5s
      retries: 20

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/csvcollab
      CORS_ORIGIN: http://localhost:8080
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3001"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
